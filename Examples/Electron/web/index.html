<!DOCTYPE html>
<html>

<html lang="en-GB">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
	<link rel="stylesheet" href="default.css" type="text/css" />
	<title>Electron</title>
</head>

<body>
	<table id="formTable">
		<tr>
			<td class="title">
				<div class="vertical-center">
					<img id="electronImage" src="Electron.png" height="40" alt="Electron logo"></img>
					<span id="titleMessage">&nbsp;&nbsp;Electron</span>
				</div>
			</td>
		</tr>
		<tr>
			<td>
				<table id="actionTable">
					<colgroup>
						<!-- <col span="1" style="width: 40%;"> -->
					</colgroup>
					<tr>
						<th>
							<span>Action</button>
						</th>
						<th>
							<span>Result</button>
						</th>
					</tr>
					<tr>
						<td>
							<button id="colorTextButton">Color Text</button>
						</td>
						<td>
							<span id="colorTextResultSpan"></span>
						</td>
					</tr>
					<tr>
						<td>
							<button id="setTitleButton">Modify Title</button>
						</td>
						<td>
							<span id="setTitleResultSpan"></span>
						</td>
					</tr>
					<tr>
						<td>
							<button id="pingButton">Send Ping</button>
						</td>
						<td>
							<span id="pingResultSpan"></span>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>

	<script src="renderer.js" type="module"></script>
</body>

</html>
